            if (currentIndex >= activeRotationOrder.length) currentIndex = 0;

            const loop = async () => {
                if (!rotateEnabled || runId !== rotateRunId) return;

                // Rotation disabled => do NOT auto-remove one-shots
                if (boardPack.rotation?.enabled === false) {
                    rotateTimer = setTimeout(loop, 500);
                    return;
                }

                // If runtime order is empty, rebuild from latest pack once
                if (!activeRotationOrder.length) resetActiveRotationOrderFromPack(boardPack);

                // If still empty, stop gracefully (no boards)
                if (!activeRotationOrder.length) {
                    await setLinesAndWait(asRows(["NO BOARDS", "IN ROTATION", "", "", "", "", "", ""]));
                    rotateTimer = setTimeout(loop, 1500);
                    return;
                }

                // Index safety
                if (currentIndex < 0) currentIndex = 0;
                if (currentIndex >= activeRotationOrder.length) currentIndex = 0;

                const key = activeRotationOrder[currentIndex];
                rotLog("Showing board:", key);

                cancelBoardWork();
                try {
                    await showStage(key);
                } catch (e) {
                    console.error("[BOARD] render failed:", key, e);
                    await setLinesAndWait(asRows(["BOARD ERROR", String(key), "", "", "", "", "", ""]));
                }

                if (!rotateEnabled || runId !== rotateRunId) return;

                // Dwell completes BEFORE one-shot removal (board runs once)
                await delay(dwell);

                if (!rotateEnabled || runId !== rotateRunId) return;

                // ONE-SHOT REMOVAL (runtime-only; NEVER mutate boardPack.rotation.order)
                if (isOneShotBoard(boardPack, key)) {
                    console.log("[ROTATION] one-shot consumed → removing:", key, "| remaining:", Math.max(0, activeRotationOrder.length - 1));
                    activeRotationOrder.splice(currentIndex, 1);

                    // If removal empties rotation, stop gracefully
                    if (!activeRotationOrder.length) {
                        rotLog("Active rotation is now empty; stopping rotation timer.");
                        stopRotation();
                        return;
                    }

                    // If we removed the last element, wrap; otherwise keep index (next board slid in)
                    if (currentIndex >= activeRotationOrder.length) currentIndex = 0;
                } else {
                    // Normal advance
                    currentIndex++;
                    if (currentIndex >= activeRotationOrder.length) currentIndex = 0;
                }

                rotateTimer = setTimeout(loop, 0);
            };

            loop();
        }


        // ============================================================
        // PRODUCTION BOOT POLISH FLAGS
        // ============================================================
        let isBootReady = false;          // blocks rotation + weather until initial data load completes
        let isInitialBootFlipDone = false; // ensures we only do the loading->first-board flip once
        let ANIM_DISABLED = true;         // suppress any flip animations until boot completes

        function makeLoadingRows(cols, rows) {
            const pad = (s) => (String(s || "").toUpperCase().padEnd(cols, " ").slice(0, cols));
            const out = [];
            out.push(pad("FLIPBOARD"));
            out.push(pad("LOADING..."));
            for (let i = 2; i < rows; i++) out.push(" ".repeat(cols));
            return out;
        }

        function setLinesInstant(lines) {
            // Convert rows -> per-cell targets (with color tokens supported), then write instantly.
            bumpAnimEpoch(); // cancel any in-flight flips
            const flat = parseRowsToCells(lines, COLS, ROWS); // flat array of {ch,color} length = COLS*ROWS
            for (let i = 0; i < COLS * ROWS; i++) {
                const cell = flat[i] || { ch: " ", color: COLOR_WHITE };
                tiles[i]?.setInstant(cell.ch || " ", cell.color || COLOR_WHITE);
            }
        }

        function renderStaticLoadingScreen() {
            // Disable animation and draw a static "FLIPBOARD / LOADING..." screen immediately.
            ANIM_DISABLED = true;
            setLinesInstant(makeLoadingRows(COLS, ROWS));
        }

        // Wrap setLines so we can suppress animation during boot.
        const __origSetLines = setLines;
        setLines = function (lines) {
            if (ANIM_DISABLED) {
                setLinesInstant(lines);
                return;
            }
            return __origSetLines(lines);
        };
        /* ============================================================
                       FIRESTORE APPLY (boardPack + events)
                    ============================================================ */
        function applyBoardPackIncoming(pack, source) {
            const normalized = normalizeBoardPack(pack);

            const json = JSON.stringify(normalized);
            if (json === lastBoardPackJSON) return;
            lastBoardPackJSON = json;

            const nextCols = Number(normalized.meta?.grid?.columns || 20);
            const nextRows = Number(normalized.meta?.grid?.rows || 8);
            const gridChanged = (nextCols !== COLS) || (nextRows !== ROWS);

            boardPack = normalized;

            // Apply global flip speed from meta.ui.flip_speed
            applyFlipSpeedFromBoardPack(boardPack);

            // Build runtime-only rotation order (one-shot support)
            resetActiveRotationOrderFromPack(boardPack);
            if (gridChanged) buildBoard(nextCols, nextRows);

            if (isBootReady) {
                if (packNeedsWeather(boardPack)) startWeatherRefresh();
                else stopWeatherRefresh();

                stopRotation();
                cancelBoardWork();
                startRotation();
            } else {
                // Boot phase: defer weather + rotation until initial load is complete.
            }

            const src = (typeof source === "string") ? source : (source == null ? "" : String(source));
            const okState = src.includes("server") ? "ok" : "warn";
            setStatus(src || "firestore", "live", okState);
        }

        function applyEventsIncoming(pack, source) {
            const normalized = normalizeEventsPack(pack);
            const json = JSON.stringify(normalized);

            if (json === lastEventsJSON) return;
            lastEventsJSON = json;

            eventsPack = normalized;

            if (DEBUG_ENABLED) console.log("[EVENTS] updated from", source, eventsPack);

            if (isBootReady) {
                stopRotation();
                cancelBoardWork();
                startRotation();
            } else {
                // Boot phase: defer rotation restart until initial load is complete.
            }
        }

        /* ============================================================
           BOOTSTRAP
        ============================================================ */
        function waitForGlobal(name, timeoutMs = 12000, pollMs = 50) {
            return new Promise((resolve, reject) => {
                const start = Date.now();
                (function tick() {
                    if (window[name]) return resolve(window[name]);
                    if (Date.now() - start >= timeoutMs) return reject(new Error(`${name} not available after ${timeoutMs}ms`));
                    setTimeout(tick, pollMs);
                })();
            });
        }

        let unsubscribeBoardPack = null;
        let unsubscribeEventsPack = null;

        (async () => {
            buildBoard(20, 8);

            // Production boot polish:
            // - show a static loading screen immediately (no flips)
            // - wait for auth + Firestore packs to load
            // - do ONE clean flip into the first stage, then start rotation
            setStatus("starting", "loading…", "warn");
            renderStaticLoadingScreen();

            try {
                await waitForGlobal("__flipboardFirestoreReady", 12000, 50);
                await window.__flipboardFirestoreReady;

                if (!window.loadBoardPack) throw new Error("loadBoardPack() missing");
                if (!window.loadEventsPack) throw new Error("loadEventsPack() missing");

                // Load events first (so countdowns are ready)
                const evPack = await window.loadEventsPack();
                applyEventsIncoming(evPack, true);

                // Load boardPack next
                const bpPack = await window.loadBoardPack();
                applyBoardPackIncoming(bpPack, true);

                if (URL_DEBUG) {
                    const order = Array.isArray(activeRotationOrder) ? activeRotationOrder : [];
                    console.log("[DEBUG] activeRotationOrder:", order);
                    console.log("[DEBUG] one_shot flags:", order.map(k => ({ key: k, one_shot: !!bpPack?.boards?.[k]?.one_shot })));
                }

                // Calendar cache: resolve if available, otherwise safely default
                if (window.loadCalendarCache) {
                    try { await window.loadCalendarCache(); }
                    catch (e) { console.warn("[CALENDAR] cache load failed (continuing):", e); }
                }

                // All required startup data is now resolved (or defaulted).
                isBootReady = true;
                ANIM_DISABLED = false;

                setStatus("ok", "ready", "ok");

                // Single, clean flip from LOADING screen -> first board in rotation
                const firstId = (Array.isArray(activeRotationOrder) && activeRotationOrder.length) ? activeRotationOrder[0] : null;
                if (firstId) {
                    await showStage(firstId);
                    isInitialBootFlipDone = true;
                }

                // Start weather refresh loop ONLY after boot is ready
                if (packNeedsWeather(boardPack)) startWeatherRefresh();
                else stopWeatherRefresh();

                // Start rotation AFTER the first stage is already shown (start at next index)
                window.__rotationStartIndex = firstId ? 1 : 0;
                startRotation();

            } catch (err) {
                console.error("[BOOT] startup failed:", err);
                setStatus("err", "startup error", "danger");
                // Keep a static screen (no flips) so it doesn't stutter.
                ANIM_DISABLED = true;
                setLinesInstant(asRows(["FLIPBOARD", "ERROR", "", "", "", "", "", ""]));
            }
        })();;
    }
</script>
